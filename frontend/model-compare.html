<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Compare</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/model-config.css">
    <style>
        .model-compare-container {
            background-color: white;
            padding: 40px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            margin: 0;
            color: #333;
            font-size: 2.5em;
            flex: 1;
        }

        .compare-form {
            max-width: 1000px;
            margin: 0 auto;
        }

        .form-section {
            background-color: #f9f9f9;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
        }

        .form-section h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1em;
            box-sizing: border-box;
            resize: vertical;
            min-height: 120px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        .model-selection-section h2 {
            margin-bottom: 25px;
        }

        .selected-models-list {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
        }

        .selected-models-list h3 {
            margin-top: 0;
            color: #333;
        }

        .model-chip {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 0.9em;
            position: relative;
            padding-right: 30px;
        }

        .model-chip .remove-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .model-chip .remove-btn:hover {
            opacity: 0.8;
        }

        .empty-message {
            color: #999;
            font-style: italic;
        }

        .model-selector {
            background-color: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .model-selector h3 {
            margin-top: 0;
            color: #333;
            margin-bottom: 15px;
        }

        .model-category {
            margin-bottom: 25px;
        }

        .model-category h4 {
            color: #555;
            margin: 15px 0 10px 0;
            font-size: 1em;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .model-option {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .model-option:hover {
            border-color: #667eea;
            background-color: #f9f9ff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .model-option input[type="radio"] {
            margin-top: 3px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .model-info {
            flex: 1;
        }

        .model-name {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .model-reasoning {
            font-size: 0.85em;
            color: #999;
            display: block;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #667eea;
        }

        #results {
            margin-top: 40px;
        }

        .results-header {
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .results-header h2 {
            color: #333;
            margin: 0 0 10px 0;
        }

        .prompt-display {
            background-color: #f0f0f0;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            word-break: break-word;
        }

        .prompt-display strong {
            color: #333;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 1200px) {
            .comparison-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }

        .model-result {
            background-color: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .model-result:hover {
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .model-result-header {
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .model-result-header h3 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .reasoning-label {
            font-size: 0.9em;
            color: #999;
            margin: 5px 0 0 0;
        }

        .model-result-content {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.95em;
            line-height: 1.5;
            word-break: break-word;
        }

        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        /* Impact Analysis Table Styles */
        .impact-analysis-section {
            margin-top: 40px;
            padding: 30px;
            background-color: #f9f9f9;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .impact-analysis-section h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .impact-table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .impact-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .impact-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
        }

        .impact-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
        }

        .impact-table tbody tr:hover {
            background-color: #f5f5f5;
        }

        .impact-table tbody tr:last-child td {
            border-bottom: none;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .category-A {
            background-color: #4caf50;
            color: white;
        }

        .category-B {
            background-color: #8bc34a;
            color: white;
        }

        .category-C {
            background-color: #ff9800;
            color: white;
        }

        .category-D {
            background-color: #f44336;
            color: white;
        }

        .category-E {
            background-color: #9e9e9e;
            color: white;
        }
    </style>
</head>

<body>
    <div class="model-compare-container">
        <div class="header">
            <button class="back-btn" onclick="goHome()">← Home</button>
            <h1>Model Compare</h1>
        </div>

        <form id="compareForm" class="compare-form" enctype="multipart/form-data">
            <!-- Prompt Input Section -->
            <div class="form-section">
                <h2>Prompt Input</h2>
                <div class="form-group">
                    <label for="prompt">Enter Your Prompt:</label>
                    <textarea id="prompt" name="prompt"
                        placeholder="Enter the prompt you want to test across different models..." required></textarea>
                </div>
            </div>

            <!-- Schema Input Section -->
            <div class="form-section">
                <h2>Schema File</h2>
                <div class="form-group">
                    <label for="schemaFile">Upload JSON Schema:</label>
                    <input type="file" id="schemaFile" name="schemaFile" accept=".json" required>
                </div>
            </div>

            <!-- Model Selection Section -->
            <div class="form-section model-selection-section">
                <h2>Select Models to Compare</h2>

                <!-- Selected Models Display -->
                <div class="selected-models-list">
                    <h3>Selected Models:</h3>
                    <div id="selectedModelsList">
                        <p class="empty-message">No models selected yet</p>
                    </div>
                </div>

                <!-- Model Selection Grid -->
                <div class="model-selector">
                    <h3>Available Models:</h3>

                    <!-- O Series -->
                    <div class="model-category">
                        <h4>O Series (Advanced Reasoning)</h4>
                        <div class="model-grid">
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="o3">
                                <div class="model-info">
                                    <span class="model-name">o3</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High, XHigh</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="o4-mini">
                                <div class="model-info">
                                    <span class="model-name">o4-mini</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- GPT-5 Series -->
                    <div class="model-category">
                        <h4>GPT-5 Series (Latest)</h4>
                        <div class="model-grid">
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5.2">
                                <div class="model-info">
                                    <span class="model-name">GPT-5.2</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5.2-pro">
                                <div class="model-info">
                                    <span class="model-name">GPT-5.2-pro</span>
                                    <span class="model-reasoning">Reasoning: Medium, High, XHigh</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5.2-codex">
                                <div class="model-info">
                                    <span class="model-name">GPT-5.2-Codex</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High, XHigh</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5.1">
                                <div class="model-info">
                                    <span class="model-name">GPT-5.1</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5.1-codex">
                                <div class="model-info">
                                    <span class="model-name">GPT-5.1-Codex</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium, High</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5">
                                <div class="model-info">
                                    <span class="model-name">GPT-5</span>
                                    <span class="model-reasoning">Reasoning: Medium, High</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5-mini">
                                <div class="model-info">
                                    <span class="model-name">GPT-5-mini</span>
                                    <span class="model-reasoning">Reasoning: Low, Medium</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-5-nano">
                                <div class="model-info">
                                    <span class="model-name">GPT-5-nano</span>
                                    <span class="model-reasoning">Reasoning: Low</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- GPT-4 Series -->
                    <div class="model-category">
                        <h4>GPT-4 Series (Prompt-Only)</h4>
                        <div class="model-grid">
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-4.1">
                                <div class="model-info">
                                    <span class="model-name">GPT-4.1</span>
                                    <span class="model-reasoning prompt-only">Prompt-Only</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-4.1-mini">
                                <div class="model-info">
                                    <span class="model-name">GPT-4.1-mini</span>
                                    <span class="model-reasoning prompt-only">Prompt-Only</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-4.1-nano">
                                <div class="model-info">
                                    <span class="model-name">GPT-4.1-nano</span>
                                    <span class="model-reasoning prompt-only">Prompt-Only</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-4o">
                                <div class="model-info">
                                    <span class="model-name">GPT-4o</span>
                                    <span class="model-reasoning prompt-only">Prompt-Only</span>
                                </div>
                            </label>
                            <label class="model-option">
                                <input type="radio" class="model-radio" name="modelSelection" value="gpt-4o-mini">
                                <div class="model-info">
                                    <span class="model-name">GPT-4o-mini</span>
                                    <span class="model-reasoning prompt-only">Prompt-Only</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button type="button" id="addModelBtn" class="submit-btn"
                            style="width: auto; padding: 12px 30px;" disabled>Add Selected Model</button>
                        <button type="button" id="clearSelectionBtn" class="submit-btn"
                            style="width: auto; padding: 12px 30px; background: linear-gradient(135deg, #999 0%, #666 100%); box-shadow: 0 4px 15px rgba(100, 100, 100, 0.3);">Clear
                            Selection</button>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="form-section">
                <button type="submit" class="submit-btn" id="submitBtn">Compare Models</button>
            </div>
        </form>

        <div id="loading" style="display: none;">
            <p>Comparing models... Please wait.</p>
        </div>

        <div id="results" style="display: none;">
            <!-- Results will be displayed here -->
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = '/home.html';
        }
    </script>
    <script src="/static/model-compare.js?v=2"></script>
</body>

</html>
